name: Pedagogical module Windows

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "prototype/pedagogical-module/**"
      - ".github/workflows/pedagogical-module-windows.yml"
  push:
    branches: [main]
    paths:
      - "prototype/pedagogical-module/**"
      - ".github/workflows/pedagogical-module-windows.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  windows-powershell-acceptance:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Build and verify field-pilot synthesis kit
        shell: pwsh
        run: |
          $build = Join-Path $env:RUNNER_TEMP 'raiatea synthesis build'
          $verify = Join-Path $env:RUNNER_TEMP 'raiatea synthesis verify'
          New-Item -ItemType Directory -Force -Path $build | Out-Null
          python prototype/pedagogical-module/build/build_synthesis_kit_archive.py --output-parent $build --release-version windows-ci-v1
          if ($LASTEXITCODE -ne 0) { throw 'synthesis kit builder failed' }
          $archive = Join-Path $build 'raiatea-evaluator-windows-ci-v1.tar'
          python prototype/pedagogical-module/build/build_evaluator_archive.py --output-parent $verify --release-version windows-ci-v1 --verify $archive
          if ($LASTEXITCODE -ne 0) { throw 'synthesis kit verification failed' }
          $release = Join-Path $verify 'raiatea-evaluator-windows-ci-v1'
          foreach ($name in @('Launch-Raiatea.ps1','Stop-Raiatea.ps1','evaluator-session-record.py','evaluator_session_record.py','evaluator_session_batch_manifest.py','evaluator_session_batch_intake.py','evaluator_session_aggregate.py','SYNTHESIS-KIT.md','synthesis-example/batch-manifest.json','synthesis-example/themes.json','synthesis-example/aggregate.json')) {
            if (-not (Test-Path -LiteralPath (Join-Path $release $name) -PathType Leaf)) { throw "missing synthesis-kit file: $name" }
          }
          "RELEASE=$release" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Validate packaged batch manifest
        shell: pwsh
        run: |
          Push-Location $env:RELEASE
          python evaluator_session_batch_manifest.py synthesis-example/batch-manifest.json
          $code = $LASTEXITCODE
          Pop-Location
          if ($code -ne 0) { throw 'batch manifest validation failed' }

      - name: Validate packaged batch intake
        shell: pwsh
        run: |
          Push-Location $env:RELEASE
          python evaluator_session_batch_intake.py synthesis-example/batch-manifest.json --root synthesis-example
          $code = $LASTEXITCODE
          Pop-Location
          if ($code -ne 0) { throw 'batch intake validation failed' }

      - name: Generate packaged aggregate
        shell: pwsh
        run: |
          $output = Join-Path $env:RUNNER_TEMP 'raiatea-synthesis-aggregate.json'
          Push-Location $env:RELEASE
          python evaluator_session_aggregate.py synthesis-example/batch-manifest.json --root synthesis-example --themes synthesis-example/themes.json --output $output
          $code = $LASTEXITCODE
          Pop-Location
          if ($code -ne 0) { throw 'aggregate generation failed' }
          if (-not (Test-Path -LiteralPath $output -PathType Leaf)) { throw 'generated aggregate missing' }

      - name: Launch smoke and stop
        shell: pwsh
        run: |
          $port = 4185
          $launch = Join-Path $env:RELEASE 'Launch-Raiatea.ps1'
          $stop = Join-Path $env:RELEASE 'Stop-Raiatea.ps1'
          & $launch -Port $port -NoOpen
          if ($LASTEXITCODE -ne 0) { throw 'launch helper failed' }
          $response = Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:$port/index.html" -TimeoutSec 5
          if ($response.StatusCode -ne 200 -or $response.Content -notmatch 'Raiatea: primo percorso pilot') { throw 'loopback smoke test failed' }
          & $stop
          if ($LASTEXITCODE -ne 0) { throw 'stop helper failed' }
          if (Test-Path -LiteralPath (Join-Path $env:RELEASE '.raiatea-runtime/server-state.json')) { throw 'runtime state was not removed' }

      - name: Verify session record lifecycle
        shell: pwsh
        run: |
          $tool = Join-Path $env:RELEASE 'evaluator-session-record.py'
          $record = Join-Path $env:RUNNER_TEMP 'evaluator-session.json'
          $copy = Join-Path $env:RUNNER_TEMP 'evaluator-session-copy.json'
          python $tool create $record --release-version windows-ci-v1 --platform windows --launcher powershell --observations 'Navigation was clear.'
          python $tool validate $record
          python $tool export $record $copy
          if (-not (Test-Path -LiteralPath $copy -PathType Leaf)) { throw 'session export missing' }
          python $tool delete $record
          if (Test-Path -LiteralPath $record) { throw 'session record was not deleted' }

      - name: Verify failure diagnostics
        shell: pwsh
        run: |
          $launch = Join-Path $env:RELEASE 'Launch-Raiatea.ps1'
          $stdout = Join-Path $env:RUNNER_TEMP 'raiatea-invalid-port.out'
          $stderr = Join-Path $env:RUNNER_TEMP 'raiatea-invalid-port.err'
          $process = Start-Process -FilePath 'pwsh' -ArgumentList @('-NoProfile','-File',('"' + $launch + '"'),'-Port','80','-NoOpen') -Wait -PassThru -RedirectStandardOutput $stdout -RedirectStandardError $stderr
          $output = (Get-Content -LiteralPath $stdout -Raw -ErrorAction SilentlyContinue) + (Get-Content -LiteralPath $stderr -Raw -ErrorAction SilentlyContinue)
          if ($process.ExitCode -eq 0 -or $output -notmatch 'PORT_INVALID') { throw 'invalid port diagnostic missing' }
