name: Pedagogical module

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "prototype/pedagogical-module/**"
      - ".github/workflows/pedagogical-module.yml"
  push:
    branches:
      - main
    paths:
      - "prototype/pedagogical-module/**"
      - ".github/workflows/pedagogical-module.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-and-build:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: |
          if ! python -m unittest discover \
            -s prototype/pedagogical-module/tests \
            -p 'test_*.py' \
            -v > /tmp/raiatea-unit-tests.log 2>&1; then
            tail -n 160 /tmp/raiatea-unit-tests.log
            exit 1
          fi
          cat /tmp/raiatea-unit-tests.log

      - name: Build and exercise synthesis kit
        run: |
          rm -rf /tmp/raiatea-synthesis-build /tmp/raiatea-synthesis-verify
          rm -f /tmp/raiatea-synthesis-aggregate.json
          mkdir -p /tmp/raiatea-synthesis-build
          python prototype/pedagogical-module/build/build_synthesis_kit_archive.py \
            --output-parent /tmp/raiatea-synthesis-build \
            --release-version synthesis-ci-v1
          archive=/tmp/raiatea-synthesis-build/raiatea-evaluator-synthesis-ci-v1.tar
          test -f "$archive"
          python prototype/pedagogical-module/build/build_evaluator_archive.py \
            --output-parent /tmp/raiatea-synthesis-verify \
            --release-version synthesis-ci-v1 \
            --verify "$archive"
          release=/tmp/raiatea-synthesis-verify/raiatea-evaluator-synthesis-ci-v1
          for name in \
            SYNTHESIS-KIT.md \
            evaluator_session_record.py \
            evaluator_session_batch_manifest.py \
            evaluator_session_batch_intake.py \
            evaluator_session_aggregate.py \
            synthesis-example/batch-manifest.json \
            synthesis-example/themes.json \
            synthesis-example/aggregate.json; do
            test -s "$release/$name"
          done
          (
            cd "$release"
            python evaluator_session_batch_manifest.py synthesis-example/batch-manifest.json
            python evaluator_session_batch_intake.py synthesis-example/batch-manifest.json \
              --root synthesis-example
            python evaluator_session_aggregate.py synthesis-example/batch-manifest.json \
              --root synthesis-example \
              --themes synthesis-example/themes.json \
              --output /tmp/raiatea-synthesis-aggregate.json
          )
          cmp "$release/synthesis-example/aggregate.json" /tmp/raiatea-synthesis-aggregate.json

      - name: Compile declarative visual layouts
        run: |
          mkdir -p /tmp/raiatea-layouts
          for layout in prototype/pedagogical-module/examples/*.layout.json; do
            [ -e "$layout" ] || continue
            name="$(basename "$layout" .layout.json)"
            python prototype/pedagogical-module/build/layout_visual.py \
              "$layout" \
              --output "/tmp/raiatea-layouts/$name.visual.json"
          done

      - name: Validate all example modules
        run: |
          for module in prototype/pedagogical-module/examples/*.json; do
            case "$module" in *.layout.json) continue ;; esac
            python prototype/pedagogical-module/build/validate_module_v2.py "$module"
          done

      - name: Build all example modules
        run: |
          mkdir -p /tmp/raiatea-modules
          for module in prototype/pedagogical-module/examples/*.json; do
            case "$module" in *.layout.json) continue ;; esac
            name="$(basename "$module" .json)"
            python prototype/pedagogical-module/build/build_module.py \
              "$module" \
              --output "/tmp/raiatea-modules/$name.html"
          done

      - name: Build runnable pilot
        run: |
          rm -rf /tmp/raiatea-pilot
          python prototype/pedagogical-module/build/build_pilot.py \
            --output /tmp/raiatea-pilot

      - name: Verify generated artifacts
        run: |
          for artifact in /tmp/raiatea-modules/*.html; do
            test -s "$artifact"
            grep -qi '<!doctype html>' "$artifact"
            grep -q 'window.RAIATEA_MODULE' "$artifact"
          done
          for visual in /tmp/raiatea-layouts/*.visual.json; do
            [ -e "$visual" ] || continue
            test -s "$visual"
            grep -q '"type": "primitives"' "$visual"
          done
          test -s /tmp/raiatea-pilot/index.html
          test -s /tmp/raiatea-pilot/query-key-value.html
          test -s /tmp/raiatea-pilot/self-attention.html
          test -s /tmp/raiatea-pilot/pilot-manifest.json
          grep -q 'query-key-value.html' /tmp/raiatea-pilot/index.html
          grep -q 'self-attention.html' /tmp/raiatea-pilot/index.html

  browser-interactions:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: prototype/pedagogical-module/package-lock.json

      - name: Install browser test dependencies
        working-directory: prototype/pedagogical-module
        run: |
          npm ci --silent
          if ! npx playwright install --with-deps chromium >/tmp/playwright-install.log 2>&1; then
            cat /tmp/playwright-install.log
            exit 1
          fi
          echo "Chromium browser and system dependencies installed."

      - name: Run browser interaction tests
        working-directory: prototype/pedagogical-module
        run: |
          set -o pipefail
          npm run test:browser 2>&1 | tee browser-test.log

      - name: Upload browser test diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: browser-test-diagnostics
          path: |
            prototype/pedagogical-module/browser-test.log
            prototype/pedagogical-module/test-results/
          if-no-files-found: error
          retention-days: 7

  release-artifact-producer:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Build reproducible evaluator archive
        run: |
          rm -rf /tmp/raiatea-ci-release /tmp/raiatea-ci-producer-verify
          mkdir -p /tmp/raiatea-ci-release
          python prototype/pedagogical-module/build/build_evaluator_archive.py \
            --output-parent /tmp/raiatea-ci-release \
            --release-version ci-v1
          test -f /tmp/raiatea-ci-release/raiatea-evaluator-ci-v1.tar
          test "$(find /tmp/raiatea-ci-release -maxdepth 1 -type f | wc -l)" -eq 1

      - name: Independently verify producer archive
        run: |
          python prototype/pedagogical-module/build/build_evaluator_archive.py \
            --output-parent /tmp/raiatea-ci-producer-verify \
            --release-version ci-v1 \
            --verify /tmp/raiatea-ci-release/raiatea-evaluator-ci-v1.tar
          test -s /tmp/raiatea-ci-producer-verify/raiatea-evaluator-ci-v1/RELEASE-NOTES.md
          sha256sum /tmp/raiatea-ci-release/raiatea-evaluator-ci-v1.tar

      - name: Upload validated evaluator archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: raiatea-evaluator-ci-v1
          path: /tmp/raiatea-ci-release/raiatea-evaluator-ci-v1.tar
          if-no-files-found: error
          retention-days: 3
          compression-level: 0

  release-artifact-consumer:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    needs: release-artifact-producer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out verifier source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Download evaluator archive
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: raiatea-evaluator-ci-v1
          path: /tmp/raiatea-ci-download

      - name: Reject unexpected artifact payload
        run: |
          test "$(find /tmp/raiatea-ci-download -maxdepth 1 -type f | wc -l)" -eq 1
          test -f /tmp/raiatea-ci-download/raiatea-evaluator-ci-v1.tar
          test "$(find /tmp/raiatea-ci-download -mindepth 1 -maxdepth 1 ! -name 'raiatea-evaluator-ci-v1.tar' | wc -l)" -eq 0

      - name: Independently verify downloaded archive
        run: |
          rm -rf /tmp/raiatea-ci-consumer-verify
          python prototype/pedagogical-module/build/build_evaluator_archive.py \
            --output-parent /tmp/raiatea-ci-consumer-verify \
            --release-version ci-v1 \
            --verify /tmp/raiatea-ci-download/raiatea-evaluator-ci-v1.tar
          release=/tmp/raiatea-ci-consumer-verify/raiatea-evaluator-ci-v1
          test -s "$release/release-manifest.json"
          test -s "$release/RELEASE-NOTES.md"
          test -s "$release/SHA256SUMS"

      - name: Smoke-test extracted pilot on loopback
        run: |
          release=/tmp/raiatea-ci-consumer-verify/raiatea-evaluator-ci-v1
          python -m http.server 4174 \
            --bind 127.0.0.1 \
            --directory "$release/pilot" \
            >/tmp/raiatea-ci-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:4174/index.html >/tmp/raiatea-ci-index.html; then
              break
            fi
            sleep 0.25
          done
          grep -q 'Raiatea: primo percorso pilot' /tmp/raiatea-ci-index.html
          curl --fail --silent http://127.0.0.1:4174/self-attention.html | grep -q 'window.RAIATEA_MODULE'
          curl --fail --silent http://127.0.0.1:4174/query-key-value.html | grep -q 'window.RAIATEA_MODULE'
          curl --fail --silent http://127.0.0.1:4174/pilot-manifest.json | grep -q '"format": "raiatea-pilot"'
