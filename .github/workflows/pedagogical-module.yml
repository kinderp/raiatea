name: Pedagogical module

on:
  push:
    paths:
      - "prototype/pedagogical-module/**"
      - ".github/workflows/pedagogical-module.yml"
  pull_request:
    paths:
      - "prototype/pedagogical-module/**"
      - ".github/workflows/pedagogical-module.yml"

permissions:
  contents: read

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: |
          python -m unittest discover \
            -s prototype/pedagogical-module/tests \
            -p 'test_*.py' \
            -v

      - name: Validate example modules
        run: |
          for module in prototype/pedagogical-module/examples/*.json; do
            python prototype/pedagogical-module/build/validate_module.py "$module"
          done

      - name: Build example modules
        run: |
          mkdir -p /tmp/raiatea-modules
          for module in prototype/pedagogical-module/examples/*.json; do
            name="$(basename "$module" .json)"
            python prototype/pedagogical-module/build/build_module.py \
              "$module" \
              --output "/tmp/raiatea-modules/$name.html"
          done

      - name: Verify generated artifacts
        run: |
          expected="$(find prototype/pedagogical-module/examples -name '*.json' | wc -l)"
          generated="$(find /tmp/raiatea-modules -name '*.html' | wc -l)"
          test "$expected" -eq "$generated"
          for artifact in /tmp/raiatea-modules/*.html; do
            test -s "$artifact"
            grep -qi '<!doctype html>' "$artifact"
            grep -q 'window.RAIATEA_MODULE' "$artifact"
          done
